name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Validate & Install
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Validate settings.json
        run: node -e "JSON.parse(require('fs').readFileSync('settings.json','utf8')); console.log('settings.json is valid JSON ✅');"

      - name: 🔍 Syntax check — index.js
        run: node --check index.js

      - name: 🔍 Syntax check — all commands
        run: |
          for f in commands/*.js; do
            node --check "$f" && echo "✅ $f" || exit 1
          done

      - name: 🔍 Syntax check — all systems
        run: |
          for f in systems/*.js; do
            node --check "$f" && echo "✅ $f" || exit 1
          done
